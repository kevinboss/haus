name: Publish to WinGet

on:
  release:
    types: [released]

jobs:
  wait:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Release
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.sha }}
          check-name: Release (windows)
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: wait
    runs-on: windows-latest
    steps:
      - name: Publish haus to WinGet
        # Tracking @main: the @v2 tag misses the fix in 19e706d ("pwsh doesn't
        # sort sometimes") which makes max-versions-to-keep delete the newest
        # versions instead of the oldest.
        uses: vedantmgoyal2009/winget-releaser@main
        with:
          identifier: kevinboss.haus
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
          max-versions-to-keep: 5
